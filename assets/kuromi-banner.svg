<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="50%" stop-color="#2d1b3d"/>
      <stop offset="100%" stop-color="#1a1025"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#9b59b6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1025" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="screenglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B68EE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7B68EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="200" rx="10" fill="url(#bg)"/>

  <!-- Ambient purple glow around Kuromi area -->
  <ellipse cx="310" cy="120" rx="150" ry="80" fill="url(#glow)"/>

  <!-- Screen glow on the left -->
  <ellipse cx="240" cy="110" rx="60" ry="50" fill="url(#screenglow)"/>

  <!-- === KUROMI AT COMPUTER (pixel art, scale=5) === -->
  <g transform="translate(280, 18) scale(5)">

    <!-- Hood - black with pink skull emblem -->
    <!-- Pointy ear tips -->
    <rect x="3" y="0" width="1" height="1" fill="#1a1a2e"/>
    <rect x="13" y="0" width="1" height="1" fill="#1a1a2e"/>
    <rect x="2" y="1" width="2" height="1" fill="#1a1a2e"/>
    <rect x="13" y="1" width="2" height="1" fill="#1a1a2e"/>
    <rect x="2" y="2" width="3" height="1" fill="#1a1a2e"/>
    <rect x="12" y="2" width="3" height="1" fill="#1a1a2e"/>
    <!-- Hood body -->
    <rect x="2" y="3" width="13" height="1" fill="#1a1a2e"/>
    <rect x="1" y="4" width="15" height="1" fill="#1a1a2e"/>
    <rect x="1" y="5" width="15" height="1" fill="#1a1a2e"/>
    <rect x="1" y="6" width="15" height="1" fill="#1a1a2e"/>
    <!-- Pink skull on hood -->
    <rect x="6" y="4" width="2" height="1" fill="#c850c0"/>
    <rect x="9" y="4" width="2" height="1" fill="#c850c0"/>
    <rect x="6" y="5" width="5" height="1" fill="#c850c0"/>
    <rect x="7" y="6" width="3" height="1" fill="#c850c0"/>

    <!-- Face - white -->
    <rect x="2" y="7" width="13" height="1" fill="#f0e6f6"/>
    <rect x="1" y="8" width="15" height="1" fill="#f0e6f6"/>
    <rect x="1" y="9" width="15" height="1" fill="#f0e6f6"/>
    <rect x="1" y="10" width="15" height="1" fill="#f0e6f6"/>
    <rect x="2" y="11" width="13" height="1" fill="#f0e6f6"/>
    <rect x="3" y="12" width="11" height="1" fill="#f0e6f6"/>

    <!-- Eyes - purple -->
    <rect x="4" y="8" width="3" height="3" fill="#4B0082"/>
    <rect x="10" y="8" width="3" height="3" fill="#4B0082"/>
    <!-- Eye shine -->
    <rect x="4" y="8" width="1" height="1" fill="#e0d0f0"/>
    <rect x="10" y="8" width="1" height="1" fill="#e0d0f0"/>
    <!-- Eye pupils -->
    <rect x="5" y="9" width="2" height="2" fill="#220033"/>
    <rect x="11" y="9" width="2" height="2" fill="#220033"/>

    <!-- Blush -->
    <rect x="3" y="10" width="1" height="1" fill="#c850c0" opacity="0.4"/>
    <rect x="13" y="10" width="1" height="1" fill="#c850c0" opacity="0.4"/>

    <!-- Mouth - small smile -->
    <rect x="7" y="11" width="3" height="1" fill="#c850c0"/>

    <!-- Body -->
    <rect x="3" y="13" width="11" height="1" fill="#1a1a2e"/>
    <rect x="2" y="14" width="13" height="1" fill="#1a1a2e"/>
    <rect x="2" y="15" width="13" height="1" fill="#1a1a2e"/>
    <rect x="2" y="16" width="13" height="1" fill="#1a1a2e"/>
    <!-- Pink detail on collar -->
    <rect x="7" y="13" width="3" height="1" fill="#c850c0"/>

    <!-- Arms reaching forward to keyboard -->
    <rect x="0" y="15" width="2" height="1" fill="#f0e6f6"/>
    <rect x="-1" y="16" width="2" height="1" fill="#f0e6f6"/>
    <rect x="15" y="15" width="2" height="1" fill="#f0e6f6"/>
    <rect x="16" y="16" width="2" height="1" fill="#f0e6f6"/>

    <!-- Tail -->
    <rect x="15" y="13" width="1" height="1" fill="#1a1a2e"/>
    <rect x="16" y="12" width="1" height="1" fill="#1a1a2e"/>
    <rect x="17" y="11" width="1" height="1" fill="#1a1a2e"/>
    <rect x="18" y="10" width="1" height="1" fill="#c850c0"/>

    <!-- Feet -->
    <rect x="3" y="17" width="3" height="1" fill="#1a1a2e"/>
    <rect x="11" y="17" width="3" height="1" fill="#1a1a2e"/>
  </g>

  <!-- === DESK === -->
  <rect x="170" y="155" width="280" height="6" rx="1" fill="#3d2b50"/>
  <rect x="170" y="161" width="280" height="2" fill="#2a1d38"/>

  <!-- === MONITOR === -->
  <!-- Monitor frame -->
  <rect x="185" y="78" width="65" height="50" rx="3" fill="#2a2a3e"/>
  <rect x="185" y="78" width="65" height="3" rx="3" fill="#3a3a50"/>
  <!-- Screen -->
  <rect x="190" y="84" width="55" height="38" fill="#1e1e3a"/>
  <!-- Screen content - code lines -->
  <rect x="194" y="89" width="20" height="2" fill="#c850c0" opacity="0.8"/>
  <rect x="194" y="94" width="30" height="2" fill="#7B68EE" opacity="0.7"/>
  <rect x="194" y="99" width="15" height="2" fill="#9b59b6" opacity="0.6"/>
  <rect x="194" y="104" width="25" height="2" fill="#7B68EE" opacity="0.7"/>
  <rect x="194" y="109" width="18" height="2" fill="#c850c0" opacity="0.5"/>
  <!-- Monitor stand -->
  <rect x="212" y="128" width="12" height="10" fill="#2a2a3e"/>
  <rect x="205" y="138" width="26" height="4" rx="1" fill="#2a2a3e"/>

  <!-- === KEYBOARD === -->
  <rect x="188" y="145" width="50" height="8" rx="2" fill="#2a2a3e"/>
  <rect x="191" y="147" width="4" height="2" fill="#3d3d55"/>
  <rect x="197" y="147" width="4" height="2" fill="#3d3d55"/>
  <rect x="203" y="147" width="4" height="2" fill="#3d3d55"/>
  <rect x="209" y="147" width="4" height="2" fill="#3d3d55"/>
  <rect x="215" y="147" width="4" height="2" fill="#3d3d55"/>
  <rect x="221" y="147" width="4" height="2" fill="#3d3d55"/>
  <rect x="227" y="147" width="4" height="2" fill="#3d3d55"/>
  <rect x="191" y="150" width="4" height="2" fill="#3d3d55"/>
  <rect x="197" y="150" width="4" height="2" fill="#3d3d55"/>
  <rect x="203" y="150" width="4" height="2" fill="#3d3d55"/>
  <rect x="209" y="150" width="4" height="2" fill="#3d3d55"/>
  <rect x="215" y="150" width="4" height="2" fill="#3d3d55"/>
  <rect x="221" y="150" width="4" height="2" fill="#3d3d55"/>
  <rect x="227" y="150" width="4" height="2" fill="#3d3d55"/>

  <!-- === TEXT: anp-exe === -->
  <text x="590" y="108" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#f0e6f6">anp-exe</text>

  <!-- Subtle purple decorative dots -->
  <circle cx="530" cy="60" r="2" fill="#c850c0" opacity="0.3"/>
  <circle cx="660" cy="150" r="2" fill="#9b59b6" opacity="0.3"/>
  <circle cx="550" cy="155" r="1.5" fill="#c850c0" opacity="0.2"/>
  <circle cx="640" cy="55" r="1.5" fill="#9b59b6" opacity="0.2"/>
  <circle cx="700" cy="100" r="1" fill="#c850c0" opacity="0.25"/>
  <circle cx="510" cy="85" r="1" fill="#9b59b6" opacity="0.2"/>

  <!-- Thin purple accent line at bottom -->
  <rect x="0" y="196" width="800" height="4" rx="2" fill="#c850c0" opacity="0.4"/>
</svg>
