<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <radialGradient id="screenglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#9b6dff" stop-opacity="0.25">
        <animate attributeName="stop-opacity" values="0.25;0.35;0.25" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#9b6dff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background - dark room -->
  <rect width="800" height="200" rx="10" fill="#151020"/>

  <!-- Floor -->
  <rect x="0" y="170" width="800" height="30" rx="0" fill="#1c1530"/>

  <!-- Back wall subtle gradient -->
  <rect x="0" y="0" width="800" height="170" fill="#181225" opacity="0.5"/>

  <!-- Window on wall - subtle night sky -->
  <rect x="580" y="20" width="80" height="55" rx="2" fill="#0d0a18"/>
  <rect x="582" y="22" width="76" height="51" fill="#141030"/>
  <!-- Stars in window -->
  <circle cx="595" cy="32" r="1" fill="#fff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="620" cy="40" r="0.8" fill="#fff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="28" r="1" fill="#fff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="610" cy="55" r="0.6" fill="#fff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Window frame cross -->
  <rect x="619" y="22" width="2" height="51" fill="#0d0a18"/>
  <rect x="582" y="46" width="76" height="2" fill="#0d0a18"/>

  <!-- Monitor glow on surroundings -->
  <ellipse cx="340" cy="110" rx="180" ry="90" fill="url(#screenglow)"/>

  <!-- === DESK === -->
  <rect x="200" y="150" width="330" height="8" rx="2" fill="#3a2850"/>
  <!-- Desk legs -->
  <rect x="215" y="158" width="6" height="20" fill="#2e1f40"/>
  <rect x="510" y="158" width="6" height="20" fill="#2e1f40"/>
  <!-- Desk edge highlight -->
  <rect x="200" y="150" width="330" height="2" rx="1" fill="#4a3565"/>

  <!-- === MONITOR === -->
  <rect x="250" y="62" width="90" height="65" rx="4" fill="#222035"/>
  <rect x="250" y="62" width="90" height="5" rx="4" fill="#2e2a45"/>
  <!-- Screen -->
  <rect x="256" y="70" width="78" height="50" rx="1" fill="#1a1435">
    <animate attributeName="fill" values="#1a1435;#1e1840;#1a1435" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Code on screen -->
  <rect x="262" y="76" width="25" height="2" fill="#c850c0" opacity="0.8"/>
  <rect x="262" y="82" width="40" height="2" fill="#7b68ee" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.8;0.6" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="262" y="88" width="18" height="2" fill="#9b6dff" opacity="0.5"/>
  <rect x="262" y="94" width="35" height="2" fill="#7b68ee" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.4;0.6" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="262" y="100" width="22" height="2" fill="#c850c0" opacity="0.5"/>
  <rect x="262" y="106" width="30" height="2" fill="#9b6dff" opacity="0.4"/>
  <!-- Cursor blinking -->
  <rect x="292" y="106" width="2" height="3" fill="#f0e6f6">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- Monitor stand -->
  <rect x="285" y="127" width="20" height="10" fill="#222035"/>
  <rect x="278" y="137" width="34" height="5" rx="1" fill="#222035"/>

  <!-- === KEYBOARD === -->
  <rect x="260" y="143" width="70" height="9" rx="2" fill="#222035"/>
  <!-- Keys row 1 -->
  <rect x="264" y="144" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="270" y="144" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="276" y="144" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="282" y="144" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="288" y="144" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="294" y="144" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="300" y="144" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="306" y="144" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="312" y="144" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="318" y="144" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <!-- Keys row 2 -->
  <rect x="266" y="148" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="272" y="148" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="278" y="148" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="284" y="148" width="12" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="298" y="148" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="304" y="148" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="310" y="148" width="4" height="3" rx="0.5" fill="#2e2a45"/>
  <rect x="316" y="148" width="4" height="3" rx="0.5" fill="#2e2a45"/>

  <!-- === COFFEE MUG === -->
  <rect x="345" y="139" width="12" height="13" rx="2" fill="#3a2850"/>
  <rect x="357" y="142" width="4" height="6" rx="2" fill="none" stroke="#3a2850" stroke-width="1.5"/>
  <!-- Steam -->
  <line x1="348" y1="136" x2="348" y2="130" stroke="#9b6dff" stroke-width="0.8" opacity="0.3">
    <animate attributeName="y2" values="130;126;130" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="352" y1="136" x2="353" y2="128" stroke="#9b6dff" stroke-width="0.8" opacity="0.2">
    <animate attributeName="y2" values="128;124;128" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.05;0.2" dur="2.5s" repeatCount="indefinite"/>
  </line>

  <!-- === KUROMI CHARACTER (right of monitor) === -->
  <g transform="translate(380, 58)">
    <!-- Gentle floating animation -->
    <animateTransform attributeName="transform" type="translate" values="380,58;380,55;380,58" dur="3s" repeatCount="indefinite"/>

    <!-- Hood/hat - dark -->
    <!-- Ear tips -->
    <rect x="8" y="0" width="5" height="5" fill="#1a1a2e"/>
    <rect x="42" y="0" width="5" height="5" fill="#1a1a2e"/>
    <!-- Ear inner -->
    <rect x="10" y="2" width="2" height="2" fill="#c850c0"/>
    <rect x="43" y="2" width="2" height="2" fill="#c850c0"/>
    <!-- Hood top -->
    <rect x="10" y="5" width="8" height="5" fill="#1a1a2e"/>
    <rect x="37" y="5" width="8" height="5" fill="#1a1a2e"/>
    <rect x="8" y="8" width="39" height="5" fill="#1a1a2e"/>
    <rect x="5" y="13" width="45" height="8" fill="#1a1a2e"/>
    <rect x="3" y="18" width="49" height="5" fill="#1a1a2e"/>
    <!-- Pink skull on hood -->
    <rect x="20" y="14" width="5" height="3" fill="#c850c0"/>
    <rect x="30" y="14" width="5" height="3" fill="#c850c0"/>
    <rect x="18" y="17" width="19" height="3" fill="#c850c0"/>
    <rect x="22" y="20" width="11" height="2" fill="#c850c0"/>

    <!-- Face -->
    <rect x="5" y="23" width="45" height="3" fill="#f0e6f6"/>
    <rect x="3" y="26" width="49" height="20" fill="#f0e6f6"/>
    <rect x="5" y="46" width="45" height="5" fill="#f0e6f6"/>
    <rect x="8" y="51" width="39" height="3" fill="#f0e6f6"/>

    <!-- Eyes -->
    <rect x="12" y="30" width="10" height="10" rx="2" fill="#2d1050"/>
    <rect x="33" y="30" width="10" height="10" rx="2" fill="#2d1050"/>
    <!-- Eye shine -->
    <rect x="13" y="31" width="4" height="4" rx="1" fill="#f0e6f6" opacity="0.7"/>
    <rect x="34" y="31" width="4" height="4" rx="1" fill="#f0e6f6" opacity="0.7"/>

    <!-- Blush -->
    <circle cx="10" cy="42" r="3" fill="#c850c0" opacity="0.3"/>
    <circle cx="45" cy="42" r="3" fill="#c850c0" opacity="0.3"/>

    <!-- Mouth -->
    <rect x="23" y="44" width="9" height="3" rx="1" fill="#c850c0"/>

    <!-- Body -->
    <rect x="10" y="54" width="35" height="20" fill="#1a1a2e"/>
    <rect x="8" y="58" width="39" height="18" fill="#1a1a2e"/>
    <!-- Pink bow -->
    <rect x="22" y="55" width="11" height="4" rx="1" fill="#c850c0"/>
    <rect x="26" y="54" width="3" height="6" fill="#c850c0"/>

    <!-- Arms -->
    <rect x="0" y="62" width="8" height="5" rx="2" fill="#f0e6f6"/>
    <rect x="47" y="62" width="8" height="5" rx="2" fill="#f0e6f6"/>

    <!-- Tail -->
    <rect x="47" y="56" width="5" height="3" fill="#1a1a2e"/>
    <rect x="52" y="53" width="5" height="3" fill="#1a1a2e"/>
    <rect x="57" y="50" width="5" height="3" fill="#1a1a2e"/>
    <circle cx="61" cy="49" r="3" fill="#c850c0"/>
  </g>

  <!-- === TEXT === -->
  <text x="640" y="108" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#f0e6f6" opacity="0.9">anp-exe</text>

  <!-- Thin accent line -->
  <rect x="0" y="197" width="800" height="3" rx="1" fill="#c850c0" opacity="0.3"/>
</svg>
